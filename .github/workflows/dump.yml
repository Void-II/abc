name: Dump Repo to Single File

on:
  workflow_dispatch:

jobs:
  dump-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to push
    steps:
      - uses: actions/checkout@v4

      - name: Generate dump file
        run: |
          python3 << 'EOF'
          import os, subprocess

          output_file = "repo-dump.md"
          ignore_dirs = {'.git', 'node_modules', '__pycache__', '.github',
                         'venv', '.venv', 'env', 'dist', 'build', 'target'}
          ignore_files = {'.DS_Store', output_file}
          max_file_size = 1_000_000

          try:
              tree_result = subprocess.run(
                  ['tree', '-a', '--noreport', '-I', '.git'],
                  capture_output=True, text=True, timeout=10
              )
              tree_str = tree_result.stdout
          except Exception:
              tree_str = "tree not available"

          with open(output_file, 'w', encoding='utf-8') as out:
              out.write("# Repository Structure and Contents\n\n")
              out.write("## Directory Tree\n\n```\n" + tree_str + "\n```\n\n")
              out.write("## File Contents\n\n")

              for root, dirs, files in os.walk('.'):
                  dirs[:] = [d for d in dirs if d not in ignore_dirs and not d.startswith('.')]
                  for file in files:
                      if file in ignore_files:
                          continue
                      filepath = os.path.relpath(os.path.join(root, file), '.')
                      try:
                          if os.path.getsize(filepath) > max_file_size:
                              out.write(f"### {filepath}\n\n*File too large, skipped.*\n\n")
                              continue
                      except OSError:
                          continue
                      try:
                          with open(filepath, 'r', encoding='utf-8') as f:
                              content = f.read()
                      except (UnicodeDecodeError, PermissionError, IsADirectoryError):
                          out.write(f"### {filepath}\n\n*Binary or unreadable.*\n\n")
                          continue
                      ext = os.path.splitext(file)[1][1:] if '.' in file else ''
                      out.write(f"### {filepath}\n\n```{ext}\n{content}\n```\n\n")
          EOF

      - name: Commit and push dump file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo-dump.md
          git commit -m "Update repo dump" || echo "No changes to commit"
          git push
